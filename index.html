<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VerdeBase Kaart</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .leaflet-popup-content {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

    // Kaart centreren op Palmela
    var map = L.map('map').setView([38.565, -8.875], 13);

    // OpenStreetMap achtergrond
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Melding 1
    L.marker([38.56269957966968, -8.87521672994725])
        .addTo(map)
        .bindPopup("<b>Melding 1</b><br>Illegale stortplaats");

    // Melding 2
    L.marker([38.56733510739968, -8.875168534004013])
        .addTo(map)
        .bindPopup("<b>Melding 2</b><br>Illegale stortplaats");

    // Melding 3
    L.marker([38.56436821764578, -8.877762647593704])
        .addTo(map)
        .bindPopup("<b>Melding 3</b><br>Illegale stortplaats");

</script>

</body>
</html>
