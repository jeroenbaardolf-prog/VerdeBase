<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VerdeBase Map</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
        }

        /* ===== Header ===== */

        #header {
            background: white;
            padding: 18px 30px;
            box-shadow: 0 2px 10px rgba(0,0,0,.15);

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title h1 {
            margin: 0;
            color: #2E7D32;
            font-size: 34px;
        }

        .title p {
            margin: 6px 0 0;
            color: #666;
            font-size: 16px;
        }

        .counter {
            background: #2E7D32;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
        }

        /* ===== Map ===== */

        #map {
            width: 100%;
            height: calc(100vh - 95px);
        }

        /* ===== Popup ===== */

        .leaflet-popup-content {
            width: 420px !important;
            font-size: 17px;
            line-height: 1.5;
        }

        .leaflet-popup-content h3 {
            margin-top: 0;
            color: #2E7D32;
            font-size: 24px;
        }

        .leaflet-popup-content img {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div id="header">

    <div class="title">
        <h1>🌿 VerdeBase</h1>
        <p>Mapping illegal construction waste in Palmela</p>
    </div>

    <div class="counter">
        📍 Reports: <span id="reportCount">1</span>
    </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([38.565, -8.875], 15);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// Large green marker
var greenIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',

    iconSize: [38, 62],
    iconAnchor: [19, 62],
    popupAnchor: [0, -58],
    shadowSize: [62, 62]
});

// Report 1
L.marker([38.56269957966968, -8.87521672994725], {
    icon: greenIcon
})
.addTo(map)
.bindPopup(`
<h3>Construction Waste Report</h3>
<p>
Illegal construction and demolition waste reported at this location.
</p>
`);

<p>
Illegal construction and demolition waste reported at this location.
</p>

<img src="https://www.dropbox.com/scl/fi/y6yzc749j93k4d0es9e22/image-1.jpg?rlkey=s6fmpk4u99d6rp8mgcthp6k6x&raw=1">
`);

</script>

</body>
</html>
